# ═══════════════════════════════════════════════════════════════════════════════
# TEMPLATES
# ═══════════════════════════════════════════════════════════════════════════════

templates:
  - test-plan-tmpl.yaml
  - test-report-tmpl.md
  - scenario-tmpl.md
  - coverage-report-tmpl.md

# ═══════════════════════════════════════════════════════════════════════════════
# TASKS
# ═══════════════════════════════════════════════════════════════════════════════

tasks:
  - analyze-screen.md
  - plan-scenarios.md
  - generate-test-doc.md
  - execute-scenarios.md
  - report-results.md

# ═══════════════════════════════════════════════════════════════════════════════
# WORKFLOWS
# ═══════════════════════════════════════════════════════════════════════════════

workflows:
  - wf-design-testing-main.yaml
  - wf-design-testing-quick.yaml

# ═══════════════════════════════════════════════════════════════════════════════
# DEPENDENCIES & INTEGRATION
# ═══════════════════════════════════════════════════════════════════════════════

dependencies:
  core_agents:
    - agent: "@qa"
      when: "Test execution and validation"

  squad_agents:
    - agent: "/dispatch:agents:dispatch-chief"
      squad: "dispatch"
      when: "Parallelize scenario execution across coverage areas"

  integrations:
    - tool: "playwright"
      when: "Automated UI interaction (future)"
    - tool: "screenshot-comparison"
      when: "Visual regression detection (future)"

# ═══════════════════════════════════════════════════════════════════════════════
# OUTPUT FORMATS
# ═══════════════════════════════════════════════════════════════════════════════

output_formats:
  test_report:
    description: "Full test execution report with scenarios, results, severity"
    template: "templates/test-report-tmpl.md"
    output_path: "_temp/design-testing/runs/{run_id}/test-report.md"

  coverage_report:
    description: "Coverage matrix by area (design, events, flows, forms, state, backend)"
    template: "templates/coverage-report-tmpl.md"
    output_path: "_temp/design-testing/runs/{run_id}/coverage-report.md"

  test_plan:
    description: "Test plan with all scenarios before execution"
    template: "templates/test-plan-tmpl.yaml"
    output_path: "_temp/design-testing/runs/{run_id}/test-plan.yaml"
